name: 🚀 Feature Request
description: File a feature request
title: "[FEATURE]: <title>"
labels: ["enhancement"]
assignees:
  - pausz
projects: ["starsimhub/8"]

body:
  - type: checkboxes
    attributes:
      label: Is there an existing feature request for this?
      description: Please search to see if a request [already exists](https://github.com/starsimhub/typhoidsim/issues?q=is%3Aissue+is%3Aopen+label%3Aenhancement+) for the feature that you are requesting.
      options:
        - label: I have searched the existing feature requests
          required: true
  - type: textarea
    attributes:
      label: Is your feature request related to a problem? Please describe.
      description: A clear and concise description of what the problem is. Ex. I'm always frustrated when [...]
    validations:
      required: true
  - type: textarea
    attributes:
      label: Describe the solution that you would like.
      description: A clear and concise description of what you want to happen.
    validations:
      required: true
  - type: textarea
    id: vignette
    attributes:
      label: Could you write a code vignette of what you would like to happen, or a workaround you have found.
      description: The code does not have to run. This will be automatically formatted into Python, so no need for backticks.
      render: python
  - type: textarea
    attributes:
      label: Anything else?
      description: |
        Links? References? Screenshots? Anything that will give us more context about the feature that you are requesting.

        Tip: You can attach images or log files by clicking this area to highlight it and then dragging files in.
    validations:
      required: false
